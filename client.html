<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Application</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>

    <!-- Google Tag Manager -->

      (function (w, d, s, l, i) {
        w[l] = w[l] || [];

          dl = l != 'dataLayer' ? '&l=' + l : '';
        j.async = true;
        j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
        f.parentNode.insertBefore(j, f);

    </script>
    <!-- End Google Tag Manager -->

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-N83BNQ64"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="nickname-form">
      <div class="login-container">
        <h2>Welcome to Chat</h2>
        <p>Connect with others in real-time chat rooms</p>
        <label for="nickname_input" class="sr-only">Enter your nickname</label>
        <input
          type="text"
          id="nickname_input"
          placeholder="Enter your nickname"
          maxlength="30"
          autocomplete="off"
        />
        <button id="setNicknameBtn" aria-label="Join Chat">Join Chat</button>
      </div>
    </div>

    <div id="chat-interface" class="hidden">
      <div id="connection-status" class="connection-status" aria-live="polite">Connecting…</div>
      <div id="toast-container" class="toast-container" aria-live="assertive"></div>

      <div class="container">
        <aside class="sidebar" id="sidebar">
          <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
          <header class="sidebar-header">
            <span id="current_room">Current Room: None</span>
            <button class="logout-btn" id="logoutBtn" title="Logout" aria-label="Logout">
              <span class="material-icons" aria-hidden="true">logout</span>
            </button>
          </header>
          <div id="room_list" role="list" aria-label="Available Rooms"></div>
          <div class="room-creation">
            <label for="new_room_input" class="sr-only">New room name</label>
            <input
              type="text"
              id="new_room_input"
              placeholder="New room name"
              maxlength="50"
              autocomplete="off"
            />
            <label for="room_password" class="sr-only">Room password (optional)</label>
            <input
              type="password"
              id="room_password"
              placeholder="Room password (optional)"
              autocomplete="off"
            />
            <button id="createRoomBtn" aria-label="Create Room">Create Room</button>
          </div>
          <div id="user_list" role="list" aria-label="Users in Room"></div>
          <div id="banned_users_list" role="list" aria-label="Banned Users"></div>
          <div id="kicked_users_list" role="list" aria-label="Kicked Users"></div>
        </aside>

        <main class="chat-container">
          <nav class="chat-tabs" id="chat-tabs" role="tablist" aria-label="Chat tabs">
            <div
              class="chat-tab active"
              data-chat="room"
              id="roomChatTab"
              role="tab"
              tabindex="0"
              aria-selected="true"
            >
              Room Chat
            </div>
          </nav>
          <div
            id="chatlog"
            class="room-chat"
            role="log"
            aria-live="polite"
            aria-label="Room messages"
          >
            <button
              id="scroll-bottom-btn"
              class="scroll-bottom-btn hidden"
              aria-label="Scroll to bottom"
            >
              ↓
            </button>
          </div>
          <div id="private-chats"></div>
          <div class="message-input-container">
            <div id="typing-indicator" class="typing-indicator" aria-live="polite"></div>
            <label for="message_input" class="sr-only">Type your message</label>
            <textarea
              id="message_input"
              placeholder="Type your message…"
              rows="1"
              maxlength="2000"
              autocomplete="off"
            ></textarea>
            <button id="sendMessageBtn" title="Send" aria-label="Send message">
              <span class="material-icons" aria-hidden="true">send</span>
            </button>
          </div>
        </main>
      </div>
    </div>

    <div id="password-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h3>Password Required</h3>
        <p id="password-modal-room"></p>
        <label for="password-modal-input" class="sr-only">Enter room password</label>
        <input
          type="password"
          id="password-modal-input"
          placeholder="Enter room password"
          autocomplete="off"
        />
        <div class="modal-buttons">
          <button id="password-modal-submit" class="btn-primary">Join</button>
          <button id="password-modal-cancel" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </div>

    <div id="confirm-dialog" class="modal-overlay hidden">
      <div class="modal-content modal-sm">
        <p id="confirm-dialog-text"></p>
        <div class="modal-buttons">
          <button id="confirm-dialog-yes" class="btn-danger">Yes</button>
          <button id="confirm-dialog-no" class="btn-secondary">No</button>
        </div>
      </div>
    </div>
  </body>
</html>
